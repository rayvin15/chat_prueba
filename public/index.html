<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <!-- Vista de Login / Registro (se muestra al principio) -->
    <div id="auth-view" class="flex items-center justify-center h-screen">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6">Bienvenido</h2>
            <form id="auth-form" class="space-y-4">
                <input type="text" id="username" placeholder="Nombre de usuario" class="w-full bg-gray-700 p-3 rounded" required>
                <input type="password" id="password" placeholder="Contraseña (mín. 6 caracteres)" class="w-full bg-gray-700 p-3 rounded" required>
                <div class="flex gap-4">
                    <button type="submit" name="action" value="login" class="w-full bg-indigo-600 p-3 rounded font-bold hover:bg-indigo-700 transition-colors">Iniciar Sesión</button>
                    <button type="submit" name="action" value="register" class="w-full bg-green-600 p-3 rounded font-bold hover:bg-green-700 transition-colors">Registrar</button>
                </div>
            </form>
            <p id="auth-error" class="text-red-400 text-center mt-4 h-5"></p>
        </div>
    </div>

    <!-- Vista Principal del Chat (oculta al principio) -->
    <div id="chat-view" class="hidden h-screen flex">
        <!-- Barra Lateral -->
        <aside class="w-full md:w-1/4 bg-gray-800 p-4 flex flex-col border-r border-gray-700">
            <div id="user-profile" class="mb-4 text-center"></div>
            <h3 class="text-lg font-bold mb-2">Amigos</h3>
            <ul id="friend-list" class="flex-1 overflow-y-auto mb-4"></ul>
            
            <div class="mt-auto">
                <div class="relative">
                    <input type="text" id="search-user" placeholder="Buscar y añadir amigo..." class="w-full bg-gray-700 p-2 rounded">
                    <ul id="search-results" class="absolute bottom-full mb-1 w-full bg-gray-600 rounded max-h-48 overflow-y-auto"></ul>
                </div>
                <button id="logout-btn" class="mt-4 w-full bg-red-600 p-2 rounded font-bold hover:bg-red-700 transition-colors">Cerrar Sesión</button>
            </div>
        </aside>

        <!-- Área Principal del Chat -->
        <main class="w-full md:w-3/4 flex flex-col">
            <div id="chat-welcome" class="flex-1 flex items-center justify-center text-gray-500 text-center p-4">
                <p>Selecciona un amigo de la lista para comenzar a chatear.<br>Si no tienes amigos, ¡busca y añade uno!</p>
            </div>
            
            <div id="chat-area" class="hidden flex-1 flex flex-col bg-gray-900">
                <header id="chat-header" class="bg-gray-800 p-4 font-bold border-b border-gray-700"></header>
                <ul id="messages" class="flex-1 p-4 space-y-4 overflow-y-auto"></ul>

                <div id="emoji-picker-container" class="hidden absolute bottom-20 right-4 z-10">
                    <emoji-picker class="dark"></emoji-picker>
                </div>
                
                <form id="message-form" class="bg-gray-800 p-4 flex items-center gap-2 border-t border-gray-700">
                    <div class="relative flex-1">
                        <input id="input" placeholder="Escribe un mensaje..." class="bg-gray-700 p-2 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button id="emoji-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 text-xl hover:scale-110 transition-transform">😀</button>
                    </div>
                    <label for="file-upload" class="bg-gray-600 p-2 rounded-md cursor-pointer hover:bg-gray-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                    </label>
                    <input id="file-upload" type="file" class="hidden">
                    <button type="submit" class="bg-indigo-600 font-bold py-2 px-4 rounded-md hover:bg-indigo-700 transition-colors">Enviar</button>
                </form>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Lógica súper completa del frontend
        const authView = document.getElementById('auth-view');
        const chatView = document.getElementById('chat-view');
        const authForm = document.getElementById('auth-form');
        const authError = document.getElementById('auth-error');
        const friendList = document.getElementById('friend-list');
        const searchUser = document.getElementById('search-user');
        const searchResults = document.getElementById('search-results');
        const logoutBtn = document.getElementById('logout-btn');
        const userProfile = document.getElementById('user-profile');
        
        const chatWelcome = document.getElementById('chat-welcome');
        const chatArea = document.getElementById('chat-area');
        const chatHeader = document.getElementById('chat-header');
        const messages = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const input = document.getElementById('input');
        const fileUpload = document.getElementById('file-upload');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPickerContainer = document.getElementById('emoji-picker-container');
        
        let socket;
        let currentChatFriend = null;
        let currentUser = {};

        // ================== LÓGICA DE AUTENTICACIÓN ==================
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const action = e.submitter.value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            authError.textContent = '';
            
            try {
                const res = await fetch(`/api/auth/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) throw new Error(await res.text());

                if (action === 'register') {
                    alert('¡Registro exitoso! Ahora inicia sesión.');
                    authForm.reset();
                } else {
                    const data = await res.json();
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    initChat();
                }
            } catch (err) {
                authError.textContent = err.message;
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.clear();
            if (socket) socket.disconnect();
            location.reload();
        });


        // ================== LÓGICA PRINCIPAL DEL CHAT ==================
        function initChat() {
            authView.classList.add('hidden');
            chatView.classList.remove('hidden');

            const token = localStorage.getItem('token');
            socket = io({ auth: { token } });
            
            currentUser.id = localStorage.getItem('userId');
            currentUser.username = localStorage.getItem('username');
            userProfile.innerHTML = `Conectado como: <span class="font-bold">${currentUser.username}</span>`;

            loadUserData();
            setupSocketListeners();
        }

        async function loadUserData() {
            const res = await fetch('/api/me/data', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const user = await res.json();
            
            friendList.innerHTML = '';
            user.friends.forEach(friend => {
                const li = document.createElement('li');
                li.textContent = friend.username;
                li.className = 'p-2 hover:bg-gray-700 cursor-pointer rounded';
                li.dataset.id = friend._id;
                li.onclick = () => startChat(friend);
                friendList.appendChild(li);
            });
        }
        
        function startChat(friend) {
            currentChatFriend = friend;
            chatWelcome.classList.add('hidden');
            chatArea.classList.remove('hidden');
            chatHeader.textContent = `Chat con ${friend.username}`;
            messages.innerHTML = '';
            socket.emit('join chat', friend._id);
        }

        // ================== BÚSQUEDA DE AMIGOS ==================
        let searchTimeout;
        searchUser.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const query = searchUser.value.trim();
                if(query.length < 2) {
                    searchResults.innerHTML = '';
                    return;
                }
                const res = await fetch(`/api/users/search?query=${query}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const users = await res.json();
                searchResults.innerHTML = '';
                users.forEach(user => {
                    const li = document.createElement('li');
                    li.textContent = `+ ${user.username}`;
                    li.className = 'p-2 text-sm text-green-400 hover:bg-gray-500 cursor-pointer';
                    li.onclick = () => addFriend(user._id);
                    searchResults.appendChild(li);
                });
            }, 300);
        });
        
        async function addFriend(friendId) {
            await fetch('/api/friends/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ friendId })
            });
            searchUser.value = '';
            searchResults.innerHTML = '';
            loadUserData();
        }
        
        // ================== MANEJO DE MENSAJES Y ARCHIVOS ==================
        function setupSocketListeners() {
            socket.on('connect_error', (err) => {
                if (err.message.includes('Authentication error')) {
                    logoutBtn.click(); // Si el token es inválido, cerramos sesión
                }
            });

            socket.on('load history', (data) => {
                messages.innerHTML = '';
                data.messages.forEach(msg => displayMessage(msg));
            });

            socket.on('chat message', (msg) => {
                if (currentChatFriend && (msg.sender._id === currentChatFriend._id || msg.sender._id === currentUser.id)) {
                    displayMessage(msg);
                }
            });
        }
        
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value && currentChatFriend) {
                socket.emit('chat message', { 
                    friendId: currentChatFriend._id,
                    message: { text: input.value }
                });
                input.value = '';
            }
        });
        
        fileUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !currentChatFriend) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/upload', { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: formData 
                });
                if (!res.ok) throw new Error('Error en la subida');
                const data = await res.json();
                socket.emit('chat message', {
                    friendId: currentChatFriend._id,
                    message: { type: data.type, url: data.url }
                });
            } catch (err) {
                alert('No se pudo subir el archivo.');
            } finally {
                fileUpload.value = ''; // Resetear el input
            }
        });
        
        function displayMessage(msg) {
            const item = document.createElement('li');
            const isOwnMessage = msg.sender._id === currentUser.id;
            
            let content = '';
            if (msg.type === 'image') {
                content = `<img src="${msg.url}" class="max-w-[250px] md:max-w-xs rounded-md mt-1 cursor-pointer" onclick="window.open(this.src, '_blank')">`;
            } else if (msg.type === 'video') {
                content = `<video src="${msg.url}" controls class="max-w-[250px] md:max-w-xs rounded-md mt-1"></video>`;
            } else {
                content = `<p class="text-white break-words">${msg.text}</p>`;
            }

            item.className = `flex flex-col w-fit max-w-lg p-2 rounded-lg ${isOwnMessage ? 'self-end bg-indigo-600' : 'self-start bg-gray-700'}`;
            item.innerHTML = `
                ${!isOwnMessage ? `<span class="font-bold text-xs text-gray-400">${msg.sender.username}</span>` : ''}
                ${content}
            `;
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        }

        // Emojis
        emojiBtn.addEventListener('click', () => emojiPickerContainer.classList.toggle('hidden'));
        document.querySelector('emoji-picker').addEventListener('emoji-click', event => {
            input.value += event.detail.unicode;
            emojiPickerContainer.classList.add('hidden');
        });

        // ================== INICIO DE LA APP ==================
        if (localStorage.getItem('token')) {
            initChat();
        }
    </script>
</body>
</html>
