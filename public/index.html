<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Pro: Llamadas y Estados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans overflow-hidden">

    <!-- Vista de Login / Registro -->
    <div id="auth-view" class="flex items-center justify-center h-screen">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6">Bienvenido</h2>
            <form id="auth-form" class="space-y-4">
                <input type="text" id="username" placeholder="Nombre de usuario" class="w-full bg-gray-700 p-3 rounded" required>
                <input type="password" id="password" placeholder="Contraseña (mín. 6 caracteres)" class="w-full bg-gray-700 p-3 rounded" required>
                <div class="flex gap-4">
                    <button type="submit" name="action" value="login" class="w-full bg-indigo-600 p-3 rounded font-bold hover:bg-indigo-700 transition-colors">Iniciar Sesión</button>
                    <button type="submit" name="action" value="register" class="w-full bg-green-600 p-3 rounded font-bold hover:bg-green-700 transition-colors">Registrar</button>
                </div>
            </form>
            <p id="auth-error" class="text-red-400 text-center mt-4 h-5"></p>
        </div>
    </div>

    <!-- Vista Principal del Chat -->
    <div id="chat-view" class="hidden h-screen flex">
        <!-- Barra Lateral -->
        <aside class="w-full md:w-1/4 bg-gray-800 p-4 flex flex-col border-r border-gray-700">
            <div id="user-profile" class="mb-4 text-center"></div>
            
            <div class="mb-4">
                <h3 class="text-lg font-bold mb-2">Estados</h3>
                <div id="status-list" class="flex gap-3 overflow-x-auto pb-2">
                    <label for="status-upload" class="flex-shrink-0 flex flex-col items-center justify-center w-16 h-16 bg-gray-700 rounded-full cursor-pointer text-2xl hover:bg-gray-600 transition-colors">+</label>
                    <input id="status-upload" type="file" accept="image/*,video/*" class="hidden">
                </div>
            </div>

            <div id="requests-section" class="mb-4">
                <h3 class="text-lg font-bold mb-2">Solicitudes de Amistad</h3>
                <ul id="request-list" class="space-y-2 max-h-32 overflow-y-auto"></ul>
            </div>

            <h3 class="text-lg font-bold mb-2">Amigos</h3>
            <ul id="friend-list" class="flex-1 overflow-y-auto mb-4"></ul>
            
            <div class="mt-auto">
                <div class="relative">
                    <input type="text" id="search-user" placeholder="Buscar usuario..." class="w-full bg-gray-700 p-2 rounded">
                    <ul id="search-results" class="absolute bottom-full mb-1 w-full bg-gray-600 rounded max-h-48 overflow-y-auto z-10"></ul>
                </div>
                <button id="logout-btn" class="mt-4 w-full bg-red-600 p-2 rounded font-bold hover:bg-red-700 transition-colors">Cerrar Sesión</button>
            </div>
        </aside>

        <!-- Área Principal del Chat -->
        <main class="w-full md:w-3/4 flex flex-col">
            <div id="chat-welcome" class="flex-1 flex items-center justify-center text-gray-500 text-center p-4">
                <p>Selecciona un amigo de la lista para comenzar a chatear.<br>Si no tienes amigos, ¡busca y envía una solicitud!</p>
            </div>
            
            <div id="chat-area" class="hidden flex-1 flex flex-col bg-gray-900">
                <header id="chat-header" class="bg-gray-800 p-4 font-bold border-b border-gray-700 flex justify-between items-center"></header>
                <ul id="messages" class="flex-1 p-4 space-y-4 overflow-y-auto"></ul>
                <div id="emoji-picker-container" class="hidden absolute bottom-20 right-4 z-10"><emoji-picker class="dark"></emoji-picker></div>
                
                <form id="message-form" class="bg-gray-800 p-4 flex items-center gap-2 border-t border-gray-700">
                    <div class="relative flex-1">
                        <input id="input" placeholder="Escribe un mensaje..." class="bg-gray-700 p-2 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button id="emoji-btn" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 text-xl hover:scale-110 transition-transform">😀</button>
                    </div>
                    <label for="file-upload" class="bg-gray-600 p-2 rounded-md cursor-pointer hover:bg-gray-500 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg></label>
                    <input id="file-upload" type="file" class="hidden">
                    <button id="record-voice-btn" type="button" class="bg-gray-600 p-2 rounded-md hover:bg-gray-500 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
                    <button type="submit" class="bg-indigo-600 font-bold py-2 px-4 rounded-md hover:bg-indigo-700 transition-colors">Enviar</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Modales para Llamadas y Estados -->
    <div id="incoming-call-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50"><div class="bg-gray-800 p-8 rounded-lg text-center"><h3 id="incoming-call-from" class="text-2xl mb-4"></h3><p class="mb-6">Te está llamando...</p><div class="flex gap-4"><button id="accept-call-btn" class="bg-green-600 px-6 py-2 rounded font-bold">Aceptar</button><button id="reject-call-btn" class="bg-red-600 px-6 py-2 rounded font-bold">Rechazar</button></div></div></div>
    <div id="call-view" class="hidden fixed inset-0 bg-gray-900 z-40 flex flex-col items-center justify-center p-4"><div class="relative w-full h-full flex items-center justify-center"><video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video><video id="local-video" autoplay playsinline muted class="absolute bottom-4 right-4 w-1/4 max-w-xs border-2 border-white rounded-md"></video></div><button id="end-call-btn" class="absolute bottom-10 bg-red-600 p-4 rounded-full font-bold">Colgar</button></div>
    <div id="status-viewer" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50"><button id="close-status-viewer" class="absolute top-4 right-4 text-white text-3xl">×</button><div id="status-content" class="max-w-md max-h-[90vh]"></div></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // --- Referencias al DOM (agrupadas) ---
        const dom = {
            auth: { view: document.getElementById('auth-view'), form: document.getElementById('auth-form'), error: document.getElementById('auth-error') },
            chat: { view: document.getElementById('chat-view'), welcome: document.getElementById('chat-welcome'), area: document.getElementById('chat-area'), header: document.getElementById('chat-header'), messages: document.getElementById('messages'), form: document.getElementById('message-form'), input: document.getElementById('input') },
            sidebar: { profile: document.getElementById('user-profile'), logoutBtn: document.getElementById('logout-btn'), friendList: document.getElementById('friend-list'), searchUser: document.getElementById('search-user'), searchResults: document.getElementById('search-results'), requestList: document.getElementById('request-list') },
            media: { fileUpload: document.getElementById('file-upload'), emojiBtn: document.getElementById('emoji-btn'), emojiPicker: document.getElementById('emoji-picker-container'), recordBtn: document.getElementById('record-voice-btn') },
            call: { view: document.getElementById('call-view'), modal: document.getElementById('incoming-call-modal'), from: document.getElementById('incoming-call-from'), acceptBtn: document.getElementById('accept-call-btn'), rejectBtn: document.getElementById('reject-call-btn'), endBtn: document.getElementById('end-call-btn'), localVideo: document.getElementById('local-video'), remoteVideo: document.getElementById('remote-video') },
            status: { list: document.getElementById('status-list'), upload: document.getElementById('status-upload'), viewer: document.getElementById('status-viewer'), content: document.getElementById('status-content'), closeBtn: document.getElementById('close-status-viewer') }
        };
        
        let socket, currentChatFriend = null, currentUser = {};
        
        // --- API Helpers ---
        const api = { async call(endpoint, method = 'GET', body = null) { const token = localStorage.getItem('token'); const options = { method, headers: { 'Authorization': `Bearer ${token}` } }; if (body) { if (body instanceof FormData) { options.body = body; } else { options.headers['Content-Type'] = 'application/json'; options.body = JSON.stringify(body); } } const res = await fetch(endpoint, options); if (!res.ok) throw new Error(await res.text()); return res.headers.get('Content-Type')?.includes('json') ? res.json() : res.text(); } };

        // --- Lógica de Autenticación ---
        dom.auth.form.addEventListener('submit', async e => { e.preventDefault(); const action = e.submitter.value; const username = document.getElementById('username').value; const password = document.getElementById('password').value; dom.auth.error.textContent = ''; try { if (action === 'register') { await api.call('/api/auth/register', 'POST', { username, password }); alert('¡Registro exitoso! Ahora inicia sesión.'); dom.auth.form.reset(); } else { const data = await api.call('/api/auth/login', 'POST', { username, password }); localStorage.setItem('token', data.accessToken); localStorage.setItem('userId', data.userId); localStorage.setItem('username', data.username); initChat(); } } catch (err) { dom.auth.error.textContent = err.message; } });
        dom.sidebar.logoutBtn.addEventListener('click', () => { localStorage.clear(); if (socket) socket.disconnect(); location.reload(); });

        // --- Lógica Principal del Chat ---
        function initChat() { dom.auth.view.classList.add('hidden'); dom.chat.view.classList.remove('hidden'); const token = localStorage.getItem('token'); socket = io({ auth: { token } }); currentUser = { id: localStorage.getItem('userId'), username: localStorage.getItem('username') }; dom.sidebar.profile.innerHTML = `Conectado como: <span class="font-bold">${currentUser.username}</span>`; loadUserData(); loadFriendRequests(); loadStatuses(); setupSocketListeners(); }
        async function loadUserData() { const user = await api.call('/api/me/data'); dom.sidebar.friendList.innerHTML = ''; user.friends.forEach(friend => { const li = document.createElement('li'); li.className = 'p-2 hover:bg-gray-700 cursor-pointer rounded flex justify-between items-center'; li.dataset.id = friend._id; li.innerHTML = `<span>${friend.username}</span><button class="call-btn text-xs bg-green-600 px-2 py-1 rounded">📞</button>`; li.querySelector('span').onclick = () => startChat(friend); li.querySelector('.call-btn').onclick = (e) => { e.stopPropagation(); startCall(friend); }; dom.sidebar.friendList.appendChild(li); }); }
        function startChat(friend) { currentChatFriend = friend; dom.chat.welcome.classList.add('hidden'); dom.chat.area.classList.remove('hidden'); dom.chat.header.innerHTML = `<span>Chat con ${friend.username}</span>`; messages.innerHTML = ''; socket.emit('join chat', friend._id); }
        
        // --- Lógica de Solicitudes de Amistad ---
        async function loadFriendRequests() { const requests = await api.call('/api/friends/requests'); dom.sidebar.requestList.innerHTML = ''; requests.forEach(req => { const li = document.createElement('li'); li.className = 'p-2 bg-gray-700 rounded flex justify-between items-center text-sm'; li.innerHTML = `<span>${req.requester.username}</span><div class="flex gap-2"><button class="accept-btn text-green-400">✓</button><button class="decline-btn text-red-400">✗</button></div>`; li.querySelector('.accept-btn').onclick = () => respondToRequest(req._id, 'accepted'); li.querySelector('.decline-btn').onclick = () => respondToRequest(req._id, 'declined'); dom.sidebar.requestList.appendChild(li); }); }
        async function respondToRequest(requestId, status) { await api.call('/api/friends/response', 'POST', { requestId, status }); loadFriendRequests(); if (status === 'accepted') loadUserData(); }
        let searchTimeout; dom.sidebar.searchUser.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(async () => { const query = dom.sidebar.searchUser.value.trim(); if (query.length < 2) { dom.sidebar.searchResults.innerHTML = ''; return; } const users = await api.call(`/api/users/search?query=${query}`); dom.sidebar.searchResults.innerHTML = ''; users.forEach(user => { const li = document.createElement('li'); li.textContent = `+ ${user.username}`; li.className = 'p-2 text-sm text-green-400 hover:bg-gray-500 cursor-pointer'; li.onclick = () => sendFriendRequest(user._id); dom.sidebar.searchResults.appendChild(li); }); }, 300); });
        async function sendFriendRequest(recipientId) { try { await api.call('/api/friends/request', 'POST', { recipientId }); alert('Solicitud enviada!'); dom.sidebar.searchUser.value = ''; dom.sidebar.searchResults.innerHTML = ''; } catch (err) { alert(err.message); } }
        
        // --- Sockets y Mensajes ---
        function setupSocketListeners() { socket.on('connect_error', err => { if (err.message.includes('Authentication')) dom.sidebar.logoutBtn.click(); }); socket.on('load history', data => { dom.chat.messages.innerHTML = ''; data.messages.forEach(msg => displayMessage(msg)); }); socket.on('chat message', msg => { if (currentChatFriend && (msg.sender._id === currentChatFriend._id || msg.sender._id === currentUser.id)) displayMessage(msg); }); socket.on('new friend request', () => { alert('¡Nueva solicitud de amistad!'); loadFriendRequests(); }); socket.on('friend request accepted', () => { alert('¡Tu solicitud de amistad fue aceptada!'); loadUserData(); }); socket.on('call-made', handleCallMade); socket.on('answer-made', handleAnswerMade); socket.on('ice-candidate', handleIceCandidate); socket.on('call-rejected', () => { alert("Llamada rechazada."); closeCall(); }); socket.on('call-ended', () => { alert("Llamada finalizada por el otro usuario."); closeCall(); }); }
        dom.chat.form.addEventListener('submit', e => { e.preventDefault(); if (dom.chat.input.value && currentChatFriend) { socket.emit('chat message', { friendId: currentChatFriend._id, message: { text: dom.chat.input.value } }); dom.chat.input.value = ''; } });
        dom.media.fileUpload.addEventListener('change', async e => { const file = e.target.files[0]; if (!file || !currentChatFriend) return; const formData = new FormData(); formData.append('file', file); try { const data = await api.call('/upload', 'POST', formData); socket.emit('chat message', { friendId: currentChatFriend._id, message: { type: data.type, url: data.url } }); } catch (err) { alert('No se pudo subir el archivo.'); } finally { dom.media.fileUpload.value = ''; } });
        function displayMessage(msg) { const item = document.createElement('li'); const isOwnMessage = msg.sender._id === currentUser.id; let content = msg.type === 'image' ? `<img src="${msg.url}" class="max-w-[250px] md:max-w-xs rounded-md mt-1 cursor-pointer" onclick="window.open(this.src, '_blank')">` : msg.type === 'video' ? `<video src="${msg.url}" controls class="max-w-[250px] md:max-w-xs rounded-md mt-1"></video>` : `<p class="text-white break-words">${msg.text}</p>`; item.className = `flex flex-col w-fit max-w-lg p-2 rounded-lg ${isOwnMessage ? 'self-end bg-indigo-600' : 'self-start bg-gray-700'}`; item.innerHTML = `${!isOwnMessage ? `<span class="font-bold text-xs text-gray-400">${msg.sender.username}</span>` : ''}${content}`; dom.chat.messages.appendChild(item); dom.chat.messages.scrollTop = dom.chat.messages.scrollHeight; }

        // --- Lógica de Notas de Voz ---
        let mediaRecorder, audioChunks = [];
        dom.media.recordBtn.addEventListener('mousedown', async () => { if (!currentChatFriend) return alert("Selecciona un chat primero."); try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' }); mediaRecorder.start(); dom.media.recordBtn.classList.add('bg-red-600'); mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = async () => { const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); const formData = new FormData(); formData.append('file', audioBlob, 'voice-note.webm'); try { const data = await api.call('/upload', 'POST', formData); socket.emit('chat message', { friendId: currentChatFriend._id, message: { type: 'video', url: data.url } }); } catch (err) { alert('No se pudo enviar la nota de voz.'); } audioChunks = []; stream.getTracks().forEach(t => t.stop()); }; } catch (err) { alert("No se pudo acceder al micrófono."); } });
        dom.media.recordBtn.addEventListener('mouseup', () => { if (mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); dom.media.recordBtn.classList.remove('bg-red-600'); } });

        // --- Lógica de Estados ---
        async function loadStatuses() { const statusesByUser = await api.call('/api/statuses'); const statusListContainer = dom.status.list; while(statusListContainer.children.length > 1) { statusListContainer.removeChild(statusListContainer.lastChild); } statusesByUser.forEach(userStatus => { const statusCircle = document.createElement('div'); statusCircle.className = 'flex-shrink-0 flex flex-col items-center cursor-pointer'; statusCircle.innerHTML = `<div class="w-16 h-16 bg-gradient-to-tr from-yellow-400 to-fuchsia-600 rounded-full p-1"><div class="bg-gray-800 w-full h-full rounded-full"></div></div><span class="text-xs mt-1">${userStatus.owner.username}</span>`; statusCircle.onclick = () => viewStatus(userStatus.stories); statusListContainer.appendChild(statusCircle); }); }
        let currentStoryIndex = 0, currentStories = [];
        function viewStatus(stories) { currentStories = stories; currentStoryIndex = 0; renderStory(); dom.status.viewer.classList.remove('hidden'); }
        function renderStory() { const story = currentStories[currentStoryIndex]; if (!story) return dom.status.closeBtn.click(); if (story.type === 'image') { dom.status.content.innerHTML = `<img src="${story.url}" class="max-h-[90vh] rounded-lg">`; } else { dom.status.content.innerHTML = `<video src="${story.url}" autoplay class="max-h-[90vh] rounded-lg"></video>`; dom.status.content.querySelector('video').onended = nextStory; } }
        function nextStory() { currentStoryIndex++; renderStory(); }
        dom.status.viewer.addEventListener('click', e => { if (e.target.id === 'status-viewer') dom.status.closeBtn.click(); else nextStory(); });
        dom.status.closeBtn.onclick = () => { dom.status.viewer.classList.add('hidden'); dom.status.content.innerHTML = ''; };
        dom.status.upload.addEventListener('change', async e => { const file = e.target.files[0]; if (!file) return; const formData = new FormData(); formData.append('file', file); try { await api.call('/api/statuses', 'POST', formData); alert("Estado subido con éxito!"); loadStatuses(); } catch (err) { alert("Error al subir el estado."); } finally { dom.status.upload.value = ''; } });

        // --- Lógica de WebRTC ---
        let peerConnection, localStream, remoteCaller = null;
        const peerConnectionConfig = { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] };
        async function startCall(friend) { if (!navigator.mediaDevices) return alert("Tu navegador no soporta videollamadas."); remoteCaller = friend; localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); dom.call.localVideo.srcObject = localStream; dom.call.view.classList.remove('hidden'); createPeerConnection(); const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer); socket.emit('call-user', { to: remoteCaller._id, offer }); }
        function createPeerConnection() { peerConnection = new RTCPeerConnection(peerConnectionConfig); localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream)); peerConnection.ontrack = e => dom.call.remoteVideo.srcObject = e.streams[0]; peerConnection.onicecandidate = e => { if (e.candidate) socket.emit('ice-candidate', { to: remoteCaller._id || remoteCaller.id, candidate: e.candidate }); }; }
        async function handleCallMade(data) { remoteCaller = data.from; dom.call.from.textContent = `${remoteCaller.username}`; dom.call.modal.classList.remove('hidden'); dom.call.acceptBtn.onclick = async () => { dom.call.modal.classList.add('hidden'); dom.call.view.classList.remove('hidden'); localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); dom.call.localVideo.srcObject = localStream; createPeerConnection(); await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer)); const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); socket.emit('make-answer', { to: remoteCaller.id, answer }); }; dom.call.rejectBtn.onclick = () => { socket.emit('reject-call', { to: remoteCaller.id }); dom.call.modal.classList.add('hidden'); remoteCaller = null; }; }
        async function handleAnswerMade(data) { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); }
        function handleIceCandidate(data) { if (peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); }
        dom.call.endBtn.addEventListener('click', () => { if(remoteCaller) socket.emit('end-call', { to: remoteCaller._id || remoteCaller.id }); closeCall(); });
        function closeCall() { if (peerConnection) { peerConnection.close(); peerConnection = null; } if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } dom.call.view.classList.add('hidden'); dom.call.localVideo.srcObject = null; dom.call.remoteVideo.srcObject = null; remoteCaller = null; }

        // --- Emojis y Arranque ---
        dom.media.emojiBtn.addEventListener('click', () => dom.media.emojiPicker.classList.toggle('hidden'));
        document.querySelector('emoji-picker').addEventListener('emoji-click', e => { dom.chat.input.value += e.detail.unicode; dom.media.emojiPicker.classList.add('hidden'); });
        if (localStorage.getItem('token')) initChat();
    </script>
</body>
</html>
